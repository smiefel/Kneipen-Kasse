<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kneipen-Kasse</title>

<link rel="manifest" href="/kneipen-kasse/manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kasse">
<meta name="theme-color" content="#1a1108">
<link rel="apple-touch-icon" href="/kneipen-kasse/icon-192.png">

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap');

:root {
  --bg:        #1a1108;
  --surface:   #261a0a;
  --card:      #2f2010;
  --border:    #5c3d1a;
  --amber:     #d4870a;
  --amber-lit: #f5a623;
  --gold:      #e8c96a;
  --cream:     #f2e8c9;
  --red:       #c0392b;
  --green:     #27ae60;
  --text:      #f2e8c9;
  --muted:     #9b8860;
  --shadow:    0 4px 24px rgba(0,0,0,0.6);
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left:   env(safe-area-inset-left, 0px);
  --safe-right:  env(safe-area-inset-right, 0px);
  --header-h: 64px;
  --tab-h: 60px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Lato', sans-serif;
}

body {
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
  padding-left: var(--safe-left);
  padding-right: var(--safe-right);
  background-image:
    radial-gradient(ellipse at 20% 0%, #3d2200 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, #2a1500 0%, transparent 50%);
  display: flex;
  flex-direction: column;
}

header {
  height: var(--header-h);
  background: linear-gradient(180deg, #0e0900 0%, var(--surface) 100%);
  border-bottom: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  flex-shrink: 0;
  box-shadow: var(--shadow);
}
header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.2rem, 3vw, 1.7rem);
  color: var(--gold);
  letter-spacing: 2px;
  text-shadow: 0 2px 8px rgba(212,135,10,0.5);
}
header h1 span { color: var(--amber-lit); }
.header-date { font-size: 0.78rem; color: var(--muted); text-align: right; line-height: 1.4; }

.app { flex: 1; overflow: hidden; position: relative; }

.tab-bar {
  height: var(--tab-h);
  background: var(--surface);
  border-top: 1.5px solid var(--border);
  display: flex;
  flex-shrink: 0;
}
.tab-btn {
  flex: 1; background: transparent; border: none; color: var(--muted);
  cursor: pointer; font-size: 0.72rem; font-family: 'Lato', sans-serif;
  letter-spacing: 0.5px; text-transform: uppercase;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 4px; padding-bottom: 4px;
  border-top: 2px solid transparent;
  -webkit-user-select: none; user-select: none;
}
.tab-btn .tab-icon { font-size: 1.5rem; line-height: 1; }
.tab-btn.active { color: var(--amber-lit); border-top-color: var(--amber); }
.tab-btn:active { opacity: 0.7; }

.view { display: none; position: absolute; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.view.active { display: block; }

/* ── KASSE ── */
#view-kasse { display: none; flex-direction: column; }
#view-kasse.active { display: flex; }

.kasse-inner { display: flex; flex: 1; min-height: 0; height: 100%; }

.drinks-panel {
  flex: 1.5; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 16px; border-right: 1px solid var(--border);
}
.drinks-panel h2 {
  font-family: 'Playfair Display', serif; font-size: 0.85rem;
  color: var(--gold); text-transform: uppercase; letter-spacing: 3px;
  margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.drinks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }

.drink-btn {
  background: var(--card); border: 1px solid var(--border); border-radius: 14px;
  padding: 18px 10px; cursor: pointer; text-align: center; color: var(--cream);
  transition: transform .12s; min-height: 100px;
  -webkit-user-select: none; user-select: none;
}
.drink-btn:active { transform: scale(0.93); }
.drink-btn .emoji { font-size: 2rem; display: block; margin-bottom: 6px; }
.drink-btn .name { font-size: 0.78rem; font-weight: 700; color: var(--cream); line-height: 1.2; }
.drink-btn .price { font-size: 0.95rem; font-weight: 700; color: var(--amber-lit); margin-top: 5px; }

.order-panel {
  width: 340px; flex-shrink: 0; display: flex; flex-direction: column;
  padding: 16px; overflow: hidden;
}
.order-panel h2 {
  font-family: 'Playfair Display', serif; font-size: 0.85rem;
  color: var(--gold); text-transform: uppercase; letter-spacing: 3px;
  margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.order-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; margin-bottom: 10px; }
.order-empty { color: var(--muted); font-size: 0.88rem; text-align: center; margin-top: 30px; font-style: italic; }

.order-item {
  display: flex; align-items: center; gap: 6px; padding: 10px;
  background: var(--card); border-radius: 10px; margin-bottom: 6px;
  border: 1px solid var(--border); animation: slideIn .15s ease;
}
@keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:none; } }
.order-item .oi-emoji { font-size: 1.2rem; flex-shrink: 0; }
.order-item .oi-name { flex: 1; font-size: 0.82rem; line-height: 1.2; }
.order-item .oi-qty-ctrl { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

.qty-btn {
  background: var(--surface); border: 1px solid var(--border); color: var(--cream);
  width: 34px; height: 34px; border-radius: 8px; cursor: pointer; font-size: 1.2rem;
  display: flex; align-items: center; justify-content: center;
  -webkit-user-select: none; user-select: none;
}
.qty-btn:active { background: var(--amber); color: #0e0900; }
.oi-qty { font-weight: 700; min-width: 22px; text-align: center; font-size: 1rem; }
.oi-subtotal { font-weight: 700; color: var(--amber-lit); min-width: 52px; text-align: right; font-size: 0.85rem; flex-shrink: 0; }
.oi-del {
  background: transparent; border: none; color: var(--muted); cursor: pointer;
  width: 34px; height: 34px; border-radius: 6px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 1rem;
}
.oi-del:active { color: var(--red); }

.order-actions { display: flex; justify-content: flex-end; margin-bottom: 8px; flex-shrink: 0; }
.btn-secondary {
  background: transparent; border: 1px solid var(--border); border-radius: 8px;
  color: var(--muted); font-size: 0.75rem; padding: 8px 14px; cursor: pointer;
  font-family: 'Lato', sans-serif; text-transform: uppercase; letter-spacing: 1px; min-height: 38px;
}
.btn-secondary:active { border-color: var(--amber); color: var(--amber-lit); }

.totals-box {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 12px 14px; margin-bottom: 10px; flex-shrink: 0;
}
.totals-row { display: flex; justify-content: space-between; align-items: center; padding: 2px 0; font-size: 0.88rem; }
.totals-row.total {
  border-top: 1px solid var(--border); margin-top: 7px; padding-top: 9px;
  font-size: 1.3rem; font-weight: 700; font-family: 'Playfair Display', serif; color: var(--gold);
}

.payment-box {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 12px 14px; flex-shrink: 0;
}
.payment-box label { display: block; font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.payment-input {
  width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  color: var(--cream); font-size: 1.5rem; font-family: 'Playfair Display', serif;
  padding: 10px 14px; text-align: right; outline: none; margin-bottom: 8px; -webkit-appearance: none;
}
.payment-input:focus { border-color: var(--amber); }

.change-display {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--surface); border-radius: 10px; padding: 9px 14px;
  margin-bottom: 10px; border: 1px solid var(--border);
}
.change-label { font-size: 0.82rem; color: var(--muted); }
.change-value { font-size: 1.4rem; font-family: 'Playfair Display', serif; font-weight: 700; color: var(--green); }
.change-value.negative { color: var(--red); }

.btn-primary {
  width: 100%; background: linear-gradient(135deg, var(--amber) 0%, #b8700a 100%);
  border: none; border-radius: 12px; color: #0e0900; font-size: 1rem;
  font-weight: 700; font-family: 'Lato', sans-serif; padding: 16px; cursor: pointer;
  letter-spacing: 1.5px; text-transform: uppercase;
  box-shadow: 0 4px 16px rgba(212,135,10,0.4); min-height: 52px;
  -webkit-user-select: none; user-select: none;
}
.btn-primary:active { opacity: 0.8; transform: scale(0.98); }
.btn-primary:disabled { opacity: 0.35; }

@media (orientation: portrait) and (max-width: 820px) {
  .kasse-inner { flex-direction: column; }
  .drinks-panel { border-right: none; border-bottom: 1px solid var(--border); flex: none; height: 52%; }
  .order-panel { width: 100%; flex: 1; }
  .drinks-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
}

/* ── HISTORIE ── */
#view-historie { padding: 20px; }
.hist-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
.hist-header h2 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--gold); }
.hist-header p { color: var(--muted); font-size: 0.82rem; margin-top: 3px; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px 14px; text-align: center; }
.stat-card .s-val { font-family: 'Playfair Display', serif; font-size: 1.9rem; font-weight: 700; color: var(--amber-lit); display: block; }
.stat-card .s-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

.hist-section-title { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--gold); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

.drink-breakdown { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 24px; }
.db-row { display: flex; align-items: center; gap: 12px; padding: 13px 16px; border-bottom: 1px solid var(--border); }
.db-row:last-child { border-bottom: none; }
.db-row .db-emoji { font-size: 1.4rem; flex-shrink: 0; }
.db-row .db-name { flex: 1; font-weight: 700; font-size: 0.9rem; }
.db-row .db-qty { color: var(--muted); font-size: 0.85rem; min-width: 60px; }
.db-row .db-rev { color: var(--amber-lit); font-weight: 700; font-size: 0.95rem; min-width: 72px; text-align: right; }
.db-bar-wrap { flex: 1.5; background: var(--surface); border-radius: 4px; height: 8px; overflow: hidden; }
.db-bar { background: linear-gradient(90deg, var(--amber), var(--amber-lit)); height: 100%; border-radius: 4px; }

.tx-log { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.tx-row { display: flex; align-items: flex-start; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
.tx-row:last-child { border-bottom: none; }
.tx-time { color: var(--muted); min-width: 52px; padding-top: 1px; flex-shrink: 0; }
.tx-items { flex: 1; color: var(--cream); line-height: 1.5; }
.tx-total { color: var(--amber-lit); font-weight: 700; min-width: 62px; text-align: right; flex-shrink: 0; }
.no-hist { color: var(--muted); text-align: center; padding: 36px; font-style: italic; }

/* ── EINSTELLUNGEN ── */
#view-einstellungen { padding: 20px; }
#view-einstellungen h2 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--gold); margin-bottom: 4px; }
#view-einstellungen > p { color: var(--muted); font-size: 0.82rem; margin-bottom: 20px; }

.settings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; margin-bottom: 20px; }
.setting-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; display: flex; align-items: center; gap: 10px; }
.sc-emoji-input { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--cream); font-size: 1.7rem; width: 56px; height: 56px; text-align: center; outline: none; flex-shrink: 0; }
.sc-fields { flex: 1; display: flex; flex-direction: column; gap: 6px; }
.sc-input { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--cream); font-family: 'Lato', sans-serif; font-size: 0.88rem; padding: 8px 10px; outline: none; width: 100%; -webkit-appearance: none; min-height: 38px; }
.sc-input:focus { border-color: var(--amber); }
.sc-price-wrap { display: flex; align-items: center; gap: 6px; }
.sc-price-wrap span { color: var(--muted); font-size: 0.9rem; }
.sc-del { background: transparent; border: none; color: var(--muted); cursor: pointer; width: 40px; height: 40px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
.sc-del:active { color: var(--red); }

.add-drink-btn { background: transparent; border: 2px dashed var(--border); border-radius: 14px; color: var(--muted); cursor: pointer; padding: 20px; font-family: 'Lato', sans-serif; font-size: 0.9rem; width: 100%; text-align: center; margin-bottom: 24px; letter-spacing: 1px; min-height: 64px; }
.add-drink-btn:active { border-color: var(--amber); color: var(--amber-lit); }

.settings-danger { background: rgba(192,57,43,0.08); border: 1px solid rgba(192,57,43,0.3); border-radius: 14px; padding: 16px 20px; margin-bottom: 20px; }
.settings-danger h3 { color: var(--red); font-size: 0.82rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
.btn-danger { background: transparent; border: 1px solid var(--red); border-radius: 10px; color: var(--red); padding: 10px 20px; cursor: pointer; font-family: 'Lato', sans-serif; font-size: 0.88rem; min-height: 44px; }
.btn-danger:active { background: var(--red); color: white; }

/* ── Success overlay ── */
.success-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.88); display: flex; align-items: center; justify-content: center; z-index: 900; opacity: 0; pointer-events: none; transition: opacity .3s; }
.success-overlay.show { opacity: 1; pointer-events: all; }
.success-box { background: var(--card); border: 2px solid var(--green); border-radius: 24px; padding: 44px 52px; text-align: center; box-shadow: 0 0 60px rgba(39,174,96,0.3); transform: scale(0.85); transition: transform .3s cubic-bezier(.34,1.56,.64,1); max-width: 90vw; }
.success-overlay.show .success-box { transform: scale(1); }
.success-box .sb-icon { font-size: 3.5rem; margin-bottom: 12px; }
.success-box h3 { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--green); margin-bottom: 14px; }
.success-box .sb-change { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 700; color: var(--gold); margin-bottom: 4px; }
.success-box .sb-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }
.success-box button { background: var(--green); border: none; border-radius: 12px; color: white; font-family: 'Lato', sans-serif; font-weight: 700; font-size: 1rem; padding: 14px 36px; cursor: pointer; min-height: 52px; }
.success-box button:active { opacity: 0.8; }

.toast { position: fixed; bottom: calc(var(--tab-h) + 16px + var(--safe-bottom)); left: 50%; transform: translateX(-50%) translateY(80px); background: var(--amber); color: #0e0900; padding: 12px 28px; border-radius: 30px; font-weight: 700; font-size: 0.95rem; box-shadow: 0 8px 30px rgba(0,0,0,0.5); transition: transform .3s cubic-bezier(.34,1.56,.64,1); z-index: 800; pointer-events: none; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <h1>🍺 <span>Kneipen</span>-Kasse</h1>
  <div class="header-date" id="headerDate"></div>
</header>

<div class="app">
  <!-- KASSE -->
  <div id="view-kasse" class="view active">
    <div class="kasse-inner">
      <div class="drinks-panel">
        <h2>Getränke</h2>
        <div class="drinks-grid" id="drinksGrid"></div>
      </div>
      <div class="order-panel">
        <h2>Bestellung</h2>
        <div class="order-list" id="orderList"></div>
        <div class="order-actions">
          <button class="btn-secondary" onclick="clearOrder()">✕ Leeren</button>
        </div>
        <div class="totals-box">
          <div class="totals-row"><span>Anzahl</span><span id="totalItems">0 Stk.</span></div>
          <div class="totals-row total"><span>Gesamt</span><span id="totalPrice">0,00 €</span></div>
        </div>
        <div class="payment-box">
          <label>Gegeben (€)</label>
          <input type="number" class="payment-input" id="paymentInput" min="0" step="0.5" placeholder="0,00" inputmode="decimal" oninput="calcChange()">
          <div class="change-display">
            <span class="change-label">Rückgeld</span>
            <span class="change-value" id="changeValue">—</span>
          </div>
          <button class="btn-primary" id="btnAbschluss" onclick="completeOrder()" disabled>Kassieren &amp; Abschließen</button>
        </div>
      </div>
    </div>
  </div>

  <!-- HISTORIE -->
  <div id="view-historie" class="view">
    <div class="hist-header">
      <div><h2>Tages-Statistik</h2><p id="histDate"></p></div>
      <button class="btn-secondary" onclick="exportCSV()">📥 CSV Export</button>
    </div>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="hist-section-title">Getränke-Übersicht</div>
    <div class="drink-breakdown" id="drinkBreakdown"></div>
    <div class="hist-section-title" style="margin-top:20px;">Buchungen</div>
    <div class="tx-log" id="txLog"></div>
    <div style="height:20px"></div>
  </div>

  <!-- EINSTELLUNGEN -->
  <div id="view-einstellungen" class="view">
    <h2>Einstellungen</h2>
    <p>Getränke bearbeiten, umbenennen und Preise anpassen.</p>
    <div class="settings-grid" id="settingsGrid"></div>
    <button class="add-drink-btn" onclick="addDrink()">＋ Neues Getränk hinzufügen</button>
    <div class="settings-danger">
      <h3>⚠ Gefahrenzone</h3>
      <button class="btn-danger" onclick="resetHistory()">Tagesabschluss / Historie löschen</button>
    </div>
    <div style="height:20px"></div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" id="tab-kasse" onclick="showView('kasse',this)">
    <span class="tab-icon">🍺</span>Kasse
  </button>
  <button class="tab-btn" id="tab-historie" onclick="showView('historie',this)">
    <span class="tab-icon">📊</span>Historie
  </button>
  <button class="tab-btn" id="tab-einstellungen" onclick="showView('einstellungen',this)">
    <span class="tab-icon">⚙️</span>Einstellungen
  </button>
</div>

<div class="success-overlay" id="successOverlay">
  <div class="success-box">
    <div class="sb-icon">🎉</div>
    <h3>Bezahlt!</h3>
    <div class="sb-change" id="sbChange"></div>
    <div class="sb-sub">Rückgeld</div>
    <button onclick="closeSuccess()">Neue Bestellung</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/kneipen-kasse/sw.js').catch(()=>{});
}

const DEFAULT_DRINKS = [
  {id:1,  emoji:'🍺', name:'Bier (0,5l)',   price:3.50},
  {id:2,  emoji:'🍺', name:'Bier (0,3l)',   price:2.50},
  {id:3,  emoji:'🥤', name:'Cola (0,3l)',   price:2.80},
  {id:4,  emoji:'🍋', name:'Limo (0,3l)',   price:2.80},
  {id:5,  emoji:'💧', name:'Wasser (0,5l)', price:2.00},
  {id:6,  emoji:'🍷', name:'Wein (0,2l)',   price:4.50},
  {id:7,  emoji:'🥃', name:'Schnaps',       price:2.50},
  {id:8,  emoji:'☕', name:'Kaffee',        price:2.50},
  {id:9,  emoji:'🍹', name:'Cocktail',      price:7.50},
  {id:10, emoji:'🧃', name:'Saft (0,2l)',   price:2.20},
];

function load(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v));}

let drinks  = load('kasse_drinks',  DEFAULT_DRINKS);
let history = load('kasse_history', []);
let order   = [];
let nextId  = load('kasse_nextId',  11);

function tick(){
  const n=new Date();
  document.getElementById('headerDate').innerHTML=
    n.toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'short'})+
    ' &nbsp;'+n.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
}
tick(); setInterval(tick,10000);

function showView(id,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');
  (btn||document.getElementById('tab-'+id)).classList.add('active');
  if(id==='historie') renderHistorie();
  if(id==='einstellungen') renderSettings();
}

function renderDrinksGrid(){
  document.getElementById('drinksGrid').innerHTML=drinks.map(d=>`
    <button class="drink-btn" onclick="addToOrder(${d.id})">
      <span class="emoji">${d.emoji}</span>
      <span class="name">${d.name}</span>
      <span class="price">${fmt(d.price)}</span>
    </button>`).join('');
}

function addToOrder(id){
  const d=drinks.find(d=>d.id===id); if(!d)return;
  const ex=order.find(o=>o.id===id);
  if(ex)ex.qty++; else order.push({...d,qty:1});
  renderOrder();
}
function changeQty(id,delta){
  const item=order.find(o=>o.id===id); if(!item)return;
  item.qty+=delta;
  if(item.qty<=0) order=order.filter(o=>o.id!==id);
  renderOrder();
}
function removeFromOrder(id){order=order.filter(o=>o.id!==id);renderOrder();}
function clearOrder(){
  order=[];
  document.getElementById('paymentInput').value='';
  document.getElementById('changeValue').textContent='—';
  document.getElementById('changeValue').className='change-value';
  document.getElementById('btnAbschluss').disabled=true;
  renderOrder();
}

function renderOrder(){
  const list=document.getElementById('orderList');
  list.innerHTML=order.length===0
    ?'<p class="order-empty">Noch keine Getränke hinzugefügt.</p>'
    :order.map(item=>`
      <div class="order-item">
        <span class="oi-emoji">${item.emoji}</span>
        <span class="oi-name">${item.name}</span>
        <div class="oi-qty-ctrl">
          <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
          <span class="oi-qty">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${item.id},+1)">+</button>
        </div>
        <span class="oi-subtotal">${fmt(item.qty*item.price)}</span>
        <button class="oi-del" onclick="removeFromOrder(${item.id})">✕</button>
      </div>`).join('');
  const total=getTotal();
  const count=order.reduce((s,i)=>s+i.qty,0);
  document.getElementById('totalItems').textContent=count+' Stk.';
  document.getElementById('totalPrice').textContent=fmt(total);
  calcChange();
}

function getTotal(){return order.reduce((s,i)=>s+i.qty*i.price,0);}

function calcChange(){
  const given=parseFloat(document.getElementById('paymentInput').value)||0;
  const total=getTotal();
  const btn=document.getElementById('btnAbschluss');
  const cv=document.getElementById('changeValue');
  if(order.length===0||given===0){cv.textContent='—';cv.className='change-value';btn.disabled=true;return;}
  const change=given-total;
  cv.textContent=fmt(Math.abs(change));
  if(change<0){cv.className='change-value negative';btn.disabled=true;}
  else{cv.className='change-value';btn.disabled=false;}
}

function completeOrder(){
  const given=parseFloat(document.getElementById('paymentInput').value)||0;
  const total=getTotal(); const change=given-total;
  if(change<0||order.length===0)return;
  history.unshift({
    id:Date.now(),
    time:new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}),
    items:order.map(o=>({id:o.id,name:o.name,emoji:o.emoji,qty:o.qty,price:o.price})),
    total,given,change
  });
  save('kasse_history',history);
  document.getElementById('sbChange').textContent=fmt(change);
  document.getElementById('successOverlay').classList.add('show');
}

function closeSuccess(){
  document.getElementById('successOverlay').classList.remove('show');
  clearOrder(); showToast('✅ Bestellung abgeschlossen!');
}

function renderHistorie(){
  document.getElementById('histDate').textContent=
    new Date().toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  const rev=history.reduce((s,t)=>s+t.total,0);
  const txn=history.length;
  const drk=history.reduce((s,t)=>s+t.items.reduce((ss,i)=>ss+i.qty,0),0);
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card"><span class="s-val">${fmt(rev)}</span><div class="s-label">Umsatz</div></div>
    <div class="stat-card"><span class="s-val">${txn}</span><div class="s-label">Buchungen</div></div>
    <div class="stat-card"><span class="s-val">${drk}</span><div class="s-label">Getränke</div></div>
    <div class="stat-card"><span class="s-val">${fmt(txn?rev/txn:0)}</span><div class="s-label">Ø Bon</div></div>`;
  const map={};
  history.forEach(tx=>tx.items.forEach(item=>{
    if(!map[item.id])map[item.id]={name:item.name,emoji:item.emoji,qty:0,rev:0};
    map[item.id].qty+=item.qty; map[item.id].rev+=item.qty*item.price;
  }));
  const sorted=Object.values(map).sort((a,b)=>b.qty-a.qty);
  const maxQ=sorted[0]?.qty||1;
  document.getElementById('drinkBreakdown').innerHTML=sorted.length===0
    ?'<div class="no-hist">Noch keine Verkäufe heute.</div>'
    :sorted.map(d=>`
      <div class="db-row">
        <span class="db-emoji">${d.emoji}</span>
        <span class="db-name">${d.name}</span>
        <div class="db-bar-wrap"><div class="db-bar" style="width:${Math.round(d.qty/maxQ*100)}%"></div></div>
        <span class="db-qty">${d.qty} Stk.</span>
        <span class="db-rev">${fmt(d.rev)}</span>
      </div>`).join('');
  document.getElementById('txLog').innerHTML=history.length===0
    ?'<div class="no-hist">Noch keine Buchungen heute.</div>'
    :history.map(tx=>`
      <div class="tx-row">
        <span class="tx-time">${tx.time}</span>
        <span class="tx-items">${tx.items.map(i=>`${i.qty}× ${i.name}`).join(', ')}</span>
        <span class="tx-total">${fmt(tx.total)}</span>
      </div>`).join('');
}

function exportCSV(){
  if(!history.length){showToast('Keine Daten.');return;}
  let csv='Uhrzeit,Artikel,Menge,Preis,Gesamtbetrag\n';
  history.forEach(tx=>tx.items.forEach(i=>{
    csv+=`${tx.time},"${i.name}",${i.qty},${i.price.toFixed(2)},${tx.total.toFixed(2)}\n`;
  }));
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='kasse_'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
  showToast('📥 CSV exportiert!');
}

function renderSettings(){
  document.getElementById('settingsGrid').innerHTML=drinks.map(d=>`
    <div class="setting-card">
      <input class="sc-emoji-input" type="text" value="${d.emoji}" maxlength="2" oninput="updateDrink(${d.id},'emoji',this.value)">
      <div class="sc-fields">
        <input class="sc-input" type="text" value="${d.name}" placeholder="Name" oninput="updateDrink(${d.id},'name',this.value)">
        <div class="sc-price-wrap">
          <input class="sc-input" type="number" value="${d.price.toFixed(2)}" min="0" step="0.10" inputmode="decimal" oninput="updateDrink(${d.id},'price',parseFloat(this.value)||0)">
          <span>€</span>
        </div>
      </div>
      <button class="sc-del" onclick="deleteDrink(${d.id})">🗑</button>
    </div>`).join('');
}

function updateDrink(id,field,val){
  const d=drinks.find(d=>d.id===id);if(d){d[field]=val;save('kasse_drinks',drinks);renderDrinksGrid();}
}
function deleteDrink(id){
  if(drinks.length<=1){showToast('Mind. 1 Getränk erforderlich.');return;}
  drinks=drinks.filter(d=>d.id!==id); order=order.filter(o=>o.id!==id);
  save('kasse_drinks',drinks); renderOrder(); renderSettings(); renderDrinksGrid();
}
function addDrink(){
  drinks.push({id:nextId++,emoji:'🍶',name:'Neues Getränk',price:2.00});
  save('kasse_drinks',drinks); save('kasse_nextId',nextId);
  renderDrinksGrid(); renderSettings(); showToast('✅ Getränk hinzugefügt!');
}
function resetHistory(){
  if(!confirm('Alle Buchungen unwiderruflich löschen?'))return;
  history=[]; save('kasse_history',history); renderHistorie(); showToast('🗑 Historie geleert.');
}

function fmt(v){return v.toLocaleString('de-DE',{style:'currency',currency:'EUR'});}
let toastT;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2500);
}

renderDrinksGrid(); renderOrder();
</script>
</body>
</html>
